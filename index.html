<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Surprise ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:sans-serif;
    touch-action:none;
}
#startScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    z-index:99999;
}
#bgImage{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}
#darkLayer{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
}
#startBtn{
    position:relative;
    z-index:10;
    padding:22px 45px;
    font-size:30px;
    border:none;
    border-radius:18px;
    cursor:pointer;
}
#container{
    width:100vw;
    height:100vh;
    position:relative;
}
#photo{
    width:100%;
    height:100%;
    object-fit:cover;
}
#overlay{
    position:absolute;
    bottom:35px;
    width:100%;
    text-align:center;
    color:white;
    font-size:42px;
    text-shadow:0 0 20px black;
}
#flash{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9999;
    animation:blink .08s infinite;
}
@keyframes blink{
0%{background:white;opacity:0;}
25%{background:white;opacity:.85;}
50%{background:black;opacity:0;}
75%{background:white;opacity:.6;}
100%{background:black;opacity:0;}
}
#developer{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:20px 35px;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(8px);
    border-radius:18px;
    color:white;
    font-size:30px;
    font-weight:bold;
    text-align:center;
    display:none;
    z-index:10000;
    text-shadow:0 0 10px black;
}
#developer a{
    color:#E1306C;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="startScreen">
    <img id="bgImage" src="background.jpg">
    <div id="darkLayer"></div>
    <button id="startBtn">click here to get free wifi</button>
</div>

<div id="flash"></div>

<div id="container">
    <img id="photo" src="photo.jpg">
    <div id="overlay">Best Memories ❤️</div>
</div>

<audio id="song1" preload="auto" loop playsinline><source src="song1.mp3" type="audio/mpeg"></audio>
<audio id="song2" preload="auto" loop playsinline><source src="song2.mp3" type="audio/mpeg"></audio>
<audio id="song3" preload="auto" loop playsinline><source src="song3.mp3" type="audio/mpeg"></audio>

<div id="developer">
    Developed by
    <a href="https://instagram.com/1_wh0ami" target="_blank">@1_wh0ami</a>
</div>

<script>
const startBtn=document.getElementById("startBtn");
const startScreen=document.getElementById("startScreen");
const developer=document.getElementById("developer");

const song1=document.getElementById("song1");
const song2=document.getElementById("song2");
const song3=document.getElementById("song3");

song1.volume=1;
song2.volume=1;
song3.volume=1;

song1.load();
song2.load();
song3.load();

startBtn.addEventListener("click",async()=>{
    try{
        await song1.play();
        setTimeout(()=>song2.play().catch(()=>{}),2000);
        setTimeout(()=>song3.play().catch(()=>{}),3000);
    }catch(e){console.log(e);}

    startScreen.style.display="none";
    developer.style.display="block";

    const elem=document.documentElement;
    if(elem.requestFullscreen){
        elem.requestFullscreen();
    }
});

document.addEventListener("visibilitychange",async()=>{
    if(document.hidden){
        try{
            await song1.play();
            await song2.play();
            await song3.play();
        }catch(e){}
    }
});

window.addEventListener("beforeunload",function(e){
    e.preventDefault();
    e.returnValue="";
});

history.pushState(null,null,location.href);
window.onpopstate=function(){
    history.go(1);
    alert("Are you sure you want to leave?\nMemories may remain unseen ❤️");
};

document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",function(e){
    if(
        e.key==="F12"||
        (e.ctrlKey&&e.shiftKey&&e.key==="I")||
        (e.ctrlKey&&e.key==="u")
    ){
        e.preventDefault();
    }
});
</script>

</body>
</html>
